onvif:
  - name: WeatherDash
    dev: eth0
    ports:
      server: 8081
      rtsp: 8554
      snapshot: 8080
    # main_stream
    highQuality:
      rtsp: /weather
      width: 1280
      height: 720
      framerate: 1
      bitrate: 1024
      quality: 4
    # sub_stream
    lowQuality:
      rtsp: /weather
      width: 1280
      height: 720
      framerate: 1
      bitrate: 1024
      quality: 1
    target:
      hostname: localhost
      ports:
        rtsp: 554
    uuid: a88b38fc-600a-4d5d-bcad-118f7ae79098
    mac: 2C:CF:67:F7:F2:49
