services:
  weather-dash:
    build:
      context: .
      args:
        - VITE_WEATHER_LAT=${VITE_WEATHER_LAT}
        - VITE_WEATHER_LON=${VITE_WEATHER_LON}
        - VITE_WEATHER_NAME=${VITE_WEATHER_NAME}
        - VITE_WEATHER_TIMEZONE=${VITE_WEATHER_TIMEZONE}
    container_name: weather-dash
    ports:
      - '5173:5173' # SPA + HTTP
    restart: unless-stopped
    environment:
      - SERVER_PORT=5173
      - FRAME_RATE=${FRAME_RATE:-5}
      - MEDIAMTX_RTSP_URL=rtsp://mediamtx:8554/live
    # Give extra memory for Playwright + FFmpeg
    deploy:
      resources:
        limits:
          memory: 2G
    depends_on:
      - mediamtx

  mediamtx:
    image: bluenviron/rtsp-simple-server:latest
    container_name: mediamtx
    ports:
      - '8554:8554' # RTSP
      - '8888:8888' # HTTP API
      - '8889:8889/tcp' # WebRTC
      - '8889:8889/udp' # WebRTC
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
