services:
  weather-dash:
    build:
      context: .
      args:
        - VITE_WEATHER_LAT=${VITE_WEATHER_LAT}
        - VITE_WEATHER_LON=${VITE_WEATHER_LON}
        - VITE_WEATHER_NAME=${VITE_WEATHER_NAME}
        - VITE_WEATHER_TIMEZONE=${VITE_WEATHER_TIMEZONE}
    container_name: weather-dash
    ports:
      - '5173:5173' # SPA + HTTP
    restart: unless-stopped
    environment:
      - SERVER_PORT=5173
      - FRAME_RATE=${FRAME_RATE:-5}
      # Point at host MediaMTX (Tony runs separately in its repo)
      - MEDIAMTX_RTSP_URL=rtsp://127.0.0.1:8554/weather-dash_main
    # Give extra memory for Playwright + FFmpeg
    deploy:
      resources:
        limits:
          memory: 2G
