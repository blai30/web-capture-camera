services:
  # Screenshots CAPTURE_URL in headless Chromium, encodes frames to H.264, and serves them over
  # RTSP + ONVIF with WS-Discovery.
  camera:
    build: .
    image: web-capture-camera:latest
    container_name: web-capture-camera
    # network_mode: host is REQUIRED, not optional:
    #  - WS-Discovery uses UDP multicast 239.255.255.250:3702; Docker's bridge network does not
    #    forward LAN multicast, so an NVR's Probe never reaches the container and discovery fails.
    #  - The ONVIF/RTSP URIs are advertised as DEVICE_HOSTNAME (the Pi's LAN IP); host networking
    #    lets clients reach them exactly as advertised (bridge NAT would break the return path).
    #  - RTSP port 554 (<1024) binds directly on the host.
    #  - If CAPTURE_URL points at localhost, the target must be served in the host network namespace.
    # Ports exposed on the LAN: 554 (RTSP), 8020 (ONVIF SOAP + snapshot), 3702/udp (WS-Discovery).
    network_mode: host
    env_file:
      - .env
    command: node server/index.ts
    restart: unless-stopped
