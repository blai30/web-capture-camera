services:
  # 1. Your Local Weather App
  weather-dash-vite-app:
    image: node:24-bookworm
    container_name: weather-dash-vite-app
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - '5173:5173'
    command: sh -c "npm install -g pnpm && CI=true pnpm install && pnpm vite --host"
    restart: unless-stopped

  # 2. RTSP Server Broker
  weather-dash-mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped

  # 3. Canvas Capture and Encoder
  weather-dash-server:
    build: .
    restart: unless-stopped
    depends_on:
      - weather-dash-vite-app

  # 4. ONVIF Protocol Emulation Layer
  weather-dash-onvif:
    # Run build-docker.sh to build a local docker image for arm64
    image: rtsp-to-onvif:arm64
    # Original: https://github.com/p10tyr/rtsp-to-onvif
    # image: kulasolutions/rtsp-to-onvif:latest
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./onvif.yaml:/onvif.yaml
    depends_on:
      - weather-dash-mediamtx
