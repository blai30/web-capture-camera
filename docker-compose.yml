services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    ports:
      - '8554:8554'
      - '8554:8554/udp'
    restart: unless-stopped
    environment:
      - rtsp_server_readTimeout=60s
      - rtsp_server_writeTimeout=60s

  weather-camera:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather-camera
    restart: unless-stopped
    depends_on:
      - mediamtx
    environment:
      - DASHBOARD_DIR=/app/dist
      - FRAME_RATE=${FRAME_RATE:-5}
      - RTSP_URL=rtsp://mediamtx:8554/weather
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-600000}
      - VITE_WEATHER_LAT=${VITE_WEATHER_LAT:-40.7128}
      - VITE_WEATHER_LON=${VITE_WEATHER_LON:--74.006}
      - VITE_WEATHER_NAME=${VITE_WEATHER_NAME:-New York}
      - PLAYWRIGHT_BROWSERS_PATH=/root/.cache/ms-playwright
    # Expose for local debugging (optional)
    # ports:
    #   - "3456:3456"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3456']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
