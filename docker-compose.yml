services:
  weather-dash:
    build:
      context: .
      args:
        - VITE_WEATHER_LAT=${VITE_WEATHER_LAT}
        - VITE_WEATHER_LON=${VITE_WEATHER_LON}
        - VITE_WEATHER_NAME=${VITE_WEATHER_NAME}
        - VITE_WEATHER_TIMEZONE=${VITE_WEATHER_TIMEZONE}
    container_name: weather-dash
    ports:
      - '5173:5173' # SPA + HTTP
      - '8000:8000' # ONVIF SOAP
      - '554:554' # RTSP
      - '3702:3702/udp' # WS-Discovery
    restart: unless-stopped
    environment:
      - SERVER_PORT=5173
      - RTSP_PORT=554
      - WS_DISCOVERY_PORT=3702
      - FRAME_RATE=${FRAME_RATE:-5}
      - ONVIF_HOST=${ONVIF_HOST:-0.0.0.0}
      # For Docker Desktop on Windows/Mac, host.docker.internal maps to the host machine.
      # Set ONVIF_ADVERTISED_HOST to the IP/hostname reachable by your UniFi controller.
      - ONVIF_ADVERTISED_HOST=${ONVIF_ADVERTISED_HOST:-host.docker.internal}
      # ONVIF credentials (UniFi requires credentials)
      - ONVIF_USER=${ONVIF_USER:-admin}
      - ONVIF_PASS=${ONVIF_PASS:-admin}
      - ONVIF_DEVICE_NAME=${ONVIF_DEVICE_NAME:-Weather Dashboard Camera}
    # Give extra memory for Playwright + FFmpeg
    deploy:
      resources:
        limits:
          memory: 2G
